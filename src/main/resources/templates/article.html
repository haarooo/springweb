<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${article.title}">블로그 글 상세</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
<div class="p-5 mb-5 text-center bg-light">
  <h1 class="mb-3">My Blog</h1>
  <h4 class="mb-3 text-secondary">블로그에 오신 것을 환영합니다</h4>
</div>

<div class="container mt-5">
  <div class="row justify-content-center"> <div class="col-lg-8">
    <article>
      <input type="hidden" id="article-id" th:value="${article.id}">
      <header class="mb-4 border-bottom pb-3">
        <h1 class="font-weight-bold mb-1" th:text="${article.title}">제목</h1>
        <div class="text-muted fst-italic mb-2"
             th:text="|Posted on ${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}|">
        </div>
      </header>
      <section class="mb-5">
        <p class="lead mb-4" style="white-space: pre-wrap;" th:text="${article.content}"></p>
      </section>
      <div class="d-flex justify-content-end gap-2">
        <button type="button" id="modify-btn"
                th:onclick="|location.href='@{/new-article(id=${article.id})}'|"
                class="btn btn-primary btn-sm mr-2">수정</button>
        <button type="button" id="delete-btn" class="btn btn-danger btn-sm">삭제</button>
      </div>
    </article>
  </div>
  </div>
</div>

<script src="/tymeleaf/article.js"></script>
</body>
</html>
