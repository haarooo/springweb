# application.properties 파일은 항상 resource폴더 바로 아래 만든다.
# 목적 : 스프링 서버가 실행될 때 설정을 로딩하는 파일
# 주석 = # 사용
# 참고 : 상단메ㅔ뉴 -> 설정 -> 인코딩 검색 -> 파일

# 1. 내장 AWS PORT 번호 변경 , 기본값은 8080 수정 가능
server.port =8080

# 2. DAO가 아닌 프로퍼티 파일에서 DB연동 JDBC
# 2-1 연동할 db서버의 주소
# spring.datasource.url=jdbc:mysql://localhost:3306/mydb0303
# spring.datasource.url=jdbc:mysql://localhost:3306/boardservice10
# spring.datasource.url=jdbc:mysql://localhost:3306/mydb0309
spring.datasource.url=jdbc:mysql://localhost:3306/mydb0317
# 2-2 연동할 db서버의 계정
spring.datasource.username=root
spring.datasource.password=1234

# 2-3 Entity 테이블 생성 , DDL : SQL 정의어
#create : 실행할때마다 삭제후 생성
#update : 실행할때마다 존재하면 수정 존재하지 않으면 생성
#none : 사용안함
spring.jpa.hibernate.ddl-auto = create


# 2-4 콘솔창에 실행된 sql 표시
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.format_sql = true
logging.level.org.hibernate.orm.jdbc.bind = TRACE
logging.level.org.hibernate.sql = DEBUG


# 2-5 서버를 실행할때 sql파일 실행 *개발단계* always,none
 spring.sql.init.mode = always
# 2-6 서버 실행 할때 classpath(resources폴더)
 spring.sql.init.data-locations=classpath:/sql/data.sql
# 2-7 서버 실행할때 JPA가 초기화 파일 실행
 spring.jpa.defer-datasource-initialization = true