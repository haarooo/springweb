# application.properties 파일은 항상 resource폴더 바로 아래 만든다.
# 목적 : 스프링 서버가 실행될 때 설정을 로딩하는 파일
# 주석 = # 사용
# 참고 : 상단메ㅔ뉴 -> 설정 -> 인코딩 검색 -> 파일

# 1. 내장 AWS PORT 번호 변경 , 기본값은 8080 수정 가능
server.port =8080

# 2. DAO가 아닌 프로퍼티 파일에서 DB연동 JDBC
# 2-1 연동할 db서버의 주소
# spring.datasource.url=jdbc:mysql://localhost:3306/mydb0303
spring.datasource.url=jdbc:mysql://localhost:3306/mydb0304
# 2-2 연동할 db서버의 계정
spring.datasource.username=root
spring.datasource.password=1234
